build:
  commands:
    - pip install -r requirements.txt

services:
  - type: web
    name: emoji-predictor-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
